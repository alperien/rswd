{% extends "base.html" %}
{% block content %}
<h2>Download Queue</h2>
<div class="stats">
  <div class="stat"><div class="stat-value">{{ stats.artists }}</div><div class="stat-label">Artists</div></div>
  <div class="stat"><div class="stat-value">{{ stats.albums }}</div><div class="stat-label">Albums</div></div>
  <div class="stat"><div class="stat-value">{{ stats.tracks }}</div><div class="stat-label">Tracks</div></div>
  <div class="stat"><div class="stat-value">{{ stats.downloaded }}</div><div class="stat-label">Downloaded</div></div>
</div>
<h2>Active Downloads</h2>
<div id="task-list" hx-get="/queue/tasks" hx-trigger="every:5s" hx-swap="innerHTML">
  <div class="empty">Loading...</div>
</div>
{% endblock %}
