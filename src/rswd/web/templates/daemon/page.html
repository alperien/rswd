{% extends "base.html" %}
{% block content %}
<h2>Daemon</h2>
<div class="infobar">
  Status: <strong class="status-{% if running %}d{% else %}x{% endif %}">{% if running %}Running{% else %}Stopped{% endif %}</strong>
  {% if started_at %} &mdash; since {{ started_at[:19] }}{% endif %}
</div>
<div style="padding:4px 8px">
  {% if running %}
  <form method="post" action="/daemon/stop" style="display:inline">
    <button type="submit">Stop Daemon</button>
  </form>
  {% else %}
  <form method="post" action="/daemon/start" style="display:inline">
    <button type="submit">Start Daemon</button>
  </form>
  {% endif %}
</div>
<h2>Logs</h2>
<div class="logs">{% for line in logs %}{{ line }}&#10;{% endfor %}</div>
{% endblock %}
