{% extends "base.html" %}
{% block content %}
<h2>Configuration</h2>
<div class="infobar">{{ config_path }}</div>
<div class="config-section">
  <h3>Deezer</h3>
  <table>
    <tr><td>ARL</td><td><input type="password" value="{% if cfg.services.deezer.arl %}********{% endif %}" disabled></td></tr>
  </table>
  <h3>Tidal</h3>
  <table>
    <tr><td>Access Token</td><td><input type="password" value="{% if cfg.services.tidal.access_token %}********{% endif %}" disabled></td></tr>
    <tr><td>Client ID</td><td><input type="text" value="{{ cfg.services.tidal.client_id or '' }}" disabled></td></tr>
  </table>
  <p class="infobar" style="margin-top:8px">Set credentials in the config file or via environment variables. See <code>rswd --help</code> for details.</p>
</div>
{% endblock %}
