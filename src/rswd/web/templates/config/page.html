{% extends "base.html" %}
{% block content %}
<h2>Configuration</h2>
<div class="infobar">{{ config_path }}</div>
<div class="config-section">
<form method="post" action="/config">
  <h3>Deezer</h3>
  <table>
    <tr><td>ARL Cookie</td><td><input type="password" name="deezer_arl" placeholder="{% if cfg.services.deezer.arl %}********{% endif %}"></td></tr>
  </table>
  <h3>Tidal</h3>
  <table>
    <tr><td>Access Token</td><td><input type="password" name="tidal_access_token" placeholder="{% if cfg.services.tidal.access_token %}********{% endif %}"></td></tr>
    <tr><td>Client ID</td><td><input type="text" name="tidal_client_id" value="{{ cfg.services.tidal.client_id or '' }}"></td></tr>
  </table>
  <button type="submit">Save</button>
</form>
<p class="infobar" style="margin-top:8px">On first save, settings are written to the config file above. You can also set credentials via <code>RSWD_DEEZER_ARL</code>, <code>RSWD_TIDAL_ACCESS_TOKEN</code> etc.</p>
</div>
{% endblock %}
