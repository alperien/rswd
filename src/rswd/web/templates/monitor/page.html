{% extends "base.html" %}
{% block content %}
<h2>Monitored Artists</h2>
{% if artists %}
<div>
{% for a in artists %}
<div class="monitor-item">
  <span>{{ a.name }} <small style="color:#888">quality={{ a.monitor_quality }}</small></span>
  <form method="post" action="/monitor/{{ a.id }}/toggle" style="display:inline">
    <button type="submit" style="background:#555">Unmonitor</button>
  </form>
</div>
{% endfor %}
</div>
{% else %}
<div class="empty">No monitored artists</div>
{% endif %}
{% endblock %}
